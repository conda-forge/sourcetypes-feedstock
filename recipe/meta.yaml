{% set name = "sourcetypes" %}
{% set version = "0.0.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sourcetypes-{{ version }}.tar.gz
  sha256: a89258eb5a9d7eb40ed9d189c999a4424e48dd9b67e1780869ecbd42ec6ce51c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - typing-extensions >=3.7.4

test:
  imports:
    - sourcetypes
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/samwillis/python-inline-source/tree/main/sourcetypes
  summary: Python Source Code Types For Inline Syntax Highlighting
  # Will make PR upstream at bundle in licnese
  license_file: LICENSE
  license: MIT

extra:
  recipe-maintainers:
    - thewchan
